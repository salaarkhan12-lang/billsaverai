name: Backend Deploy

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'infrastructure/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: billsaver-backend
  TERRAFORM_VERSION: 1.5.0

jobs:
  # Security and Compliance Checks
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Backend Tests
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: security-scan
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run linting
        run: |
          cd backend
          npm run lint

      - name: Run tests
        run: |
          cd backend
          npm run test:ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          directory: ./backend/coverage
          flags: backend

  # Infrastructure Tests
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: |
          cd infrastructure/terraform
          terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          cd infrastructure/terraform
          terraform init -backend=false
          terraform validate

  # Build and Push Docker Image
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, terraform-validate]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Deploy to Development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Plan (Dev)
        run: |
          cd infrastructure/terraform
          terraform init
          terraform workspace select dev || terraform workspace new dev
          terraform plan -var-file=dev.tfvars -out=tfplan

      - name: Terraform Apply (Dev)
        run: |
          cd infrastructure/terraform
          terraform apply tfplan

      - name: Deploy ECS Service
        run: |
          aws ecs update-service \
            --cluster billsaver-dev-ecs-cluster \
            --service billsaver-dev-backend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Run Database Migrations
        run: |
          # Run migrations against dev database
          aws ecs run-task \
            --cluster billsaver-dev-ecs-cluster \
            --task-definition billsaver-dev-migration-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-12345,subnet-67890],securityGroups=[sg-12345]}" \
            --region ${{ env.AWS_REGION }}

  # Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Plan (Prod)
        run: |
          cd infrastructure/terraform
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform plan -var-file=prod.tfvars -out=tfplan

      - name: Terraform Apply (Prod)
        run: |
          cd infrastructure/terraform
          terraform apply tfplan

      - name: Deploy ECS Service
        run: |
          aws ecs update-service \
            --cluster billsaver-prod-ecs-cluster \
            --service billsaver-prod-backend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Run Database Migrations
        run: |
          # Run migrations against prod database
          aws ecs run-task \
            --cluster billsaver-prod-ecs-cluster \
            --task-definition billsaver-prod-migration-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-12345,subnet-67890],securityGroups=[sg-12345]}" \
            --region ${{ env.AWS_REGION }}

      - name: Health Check
        run: |
          # Wait for deployment to be healthy
          aws ecs wait services-stable \
            --cluster billsaver-prod-ecs-cluster \
            --services billsaver-prod-backend-service \
            --region ${{ env.AWS_REGION }}

  # Post-Deployment Tests
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run API Integration Tests
        run: |
          cd backend
          npm run test:integration
        env:
          API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          API_KEY: ${{ secrets.DEV_API_KEY }}

  # Compliance and Security Checks
  compliance-check:
    name: Compliance Check
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run HIPAA Compliance Checks
        run: |
          # Check for PHI data handling
          # Validate encryption configurations
          # Audit logging verification
          echo "Running HIPAA compliance checks..."

      - name: Generate Compliance Report
        run: |
          # Generate compliance report
          echo "Compliance check completed"
