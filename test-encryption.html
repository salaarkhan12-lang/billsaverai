<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encryption Test</title>
</head>
<body>
    <h1>BillSaver Encryption Test</h1>
    <div id="results"></div>

    <script type="module">
        // Import our encryption modules
        import { EncryptionService } from './src/lib/encryption-service.js';
        import { encryptAnalysisResult, decryptAnalysisResult } from './src/lib/encryption.js';

        const resultsDiv = document.getElementById('results');

        function log(message) {
            console.log(message);
            resultsDiv.innerHTML += '<p>' + message + '</p>';
        }

        async function runTests() {
            try {
                log('Starting encryption tests...');

                // Test data
                const testAnalysisResult = {
                    overallScore: 85,
                    documentationLevel: 'Good',
                    gaps: [
                        {
                            id: 'test-gap',
                            category: 'major',
                            title: 'Test Gap',
                            description: 'Test gap description',
                            impact: 'Test impact',
                            recommendation: 'Test recommendation',
                            potentialRevenueLoss: '$500',
                            mlConfidence: 0.8,
                            isMLDetected: true
                        }
                    ],
                    strengths: ['Good documentation', 'Clear assessment'],
                    suggestedEMLevel: '99214',
                    currentEMLevel: '99213',
                    potentialUpcodeOpportunity: true,
                    totalPotentialRevenueLoss: '$1,200',
                    mdmComplexity: 'Moderate',
                    timeDocumented: true,
                    meatCriteriaMet: true
                };

                const testPassword = 'testPassword123!';

                // Test 1: Basic encryption/decryption
                log('Test 1: Basic encryption/decryption');
                const encrypted = await encryptAnalysisResult(testAnalysisResult, testPassword);
                log('✓ Encryption successful');

                const decrypted = await decryptAnalysisResult(encrypted, testPassword);
                log('✓ Decryption successful');

                // Verify data integrity
                const originalJson = JSON.stringify(testAnalysisResult);
                const decryptedJson = decrypted.decryptedData;

                if (originalJson === decryptedJson) {
                    log('✓ Data integrity verified');
                } else {
                    log('✗ Data integrity check failed');
                }

                // Test 2: EncryptionService
                log('Test 2: EncryptionService functionality');
                const serviceEncrypted = await EncryptionService.encryptAnalysisResult(testAnalysisResult, testPassword);
                log('✓ Service encryption successful');

                const serviceDecrypted = await EncryptionService.decryptAnalysisResult(serviceEncrypted, testPassword);
                log('✓ Service decryption successful');

                // Test 3: Wrong password should fail
                log('Test 3: Wrong password test');
                try {
                    await decryptAnalysisResult(encrypted, 'wrongPassword');
                    log('✗ Wrong password test failed - should have thrown error');
                } catch (error) {
                    log('✓ Wrong password correctly rejected');
                }

                // Test 4: Local storage operations
                log('Test 4: Local storage operations');
                await EncryptionService.storeEncryptedDataLocally(serviceEncrypted);
                log('✓ Data stored locally');

                const retrieved = await EncryptionService.retrieveEncryptedDataLocally(serviceEncrypted.id);
                if (retrieved) {
                    log('✓ Data retrieved from local storage');
                } else {
                    log('✗ Failed to retrieve data from local storage');
                }

                // Test 5: Validation
                log('Test 5: Encryption validation');
                const isValid = await EncryptionService.validateEncryption(testAnalysisResult, testPassword);
                if (isValid) {
                    log('✓ Encryption validation passed');
                } else {
                    log('✗ Encryption validation failed');
                }

                log('All tests completed successfully! 🎉');

            } catch (error) {
                log('Test failed with error: ' + error.message);
                console.error(error);
            }
        }

        // Run tests when page loads
        runTests();
    </script>
</body>
</html>
